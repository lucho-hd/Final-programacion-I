<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Luciano Caruso</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.1/font/bootstrap-icons.css">
</head>
<body>
    <header>
        <div class="container nav">
            <a href="#" class="fs-4 fw-bold text-decoration-none">Pegasus Store</a>
            <i class="bi bi-bag fs-5" id="icono-carrito" data-bs-toggle="modal" data-bs-target="#modal-carrito"> Mi carrito</i>
            <div class="carrito">
                <h2 class="titulo-carrito fw-bold">Tu Carrito</h2>
            </div>
        </div>
    </header>

    <section class="container">
        <h2 class="pt-5 fw-bold borde">Nuestros Productos</h2>
        <div id="contenedor-productos" class="contenedor-tienda">

        </div>
    </section>

    <!--Modal del carrito de compras-->
    <div class="modal fade" 
         id="modal-carrito" 
         tabindex="-1" 
         aria-labelledby="modal-carrito" 
         aria-hidden="true">

        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title" id="exampleModalLabel">Mi Carrito</h3>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-lg-4 col-md-3 col">
                        <div id="carrito-contenedor">
                            
                        </div>
                    </div>
                </div>
                <p class="precioProducto">Precio total: $<span id="precioTotal">0</span></p>
                <button id="vaciar-carrito" class="boton-agregar">Vaciar carrito</button>
            </div>
          </div>
        </div>
      </div>

      <!--Añadir modal de éxito al agregar--->
</body>
<script src="js/final.js"></script>
<script src="js/bootstrap.bundle.min.js"></script>
</html>
